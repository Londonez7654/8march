<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С 8 Марта! 💐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Comfortaa', sans-serif;
            /* Красивый градиент вместо чёрного */
            background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460, #533483);
            background-size: 400% 400%;
            animation: bgShift 10s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === ФОТО ПЕРСОНАЖА === */
        .character-img {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            max-height: 55vh;
            max-width: 90vw;
            object-fit: contain;
            transition: opacity 0.4s ease;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.5));
        }

        .character-img.fade {
            opacity: 0;
        }

        /* Декоративные частицы на фоне */
        .bg-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* === ДИАЛОГОВЫЙ БОКС === */
        .dialog-box {
            position: fixed;
            bottom: 20px;
            left: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 18px 20px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .dialog-box.hidden {
            display: none;
        }

        .speaker-name {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b9d;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
        }

        .dialog-text {
            font-size: 15px;
            color: #fff;
            line-height: 1.6;
            flex: 1;
            min-height: 50px;
        }

        /* Треугольник "тапни" */
        .tap-indicator {
            align-self: flex-end;
            margin-top: 8px;
            opacity: 0;
        }

        .tap-indicator.show {
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .tap-triangle {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #ff6b9d;
        }

        /* === ВАРИАНТЫ ОТВЕТА === */
        .choices-container {
            position: fixed;
            bottom: 20px;
            left: 10px;
            right: 10px;
            z-index: 10;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .choices-container.show {
            display: flex;
        }

        .choice-question {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .choice-question .speaker-name {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b9d;
            margin-bottom: 6px;
        }

        .choice-question .question-text {
            font-size: 15px;
            color: #fff;
            line-height: 1.5;
        }

        .choice-btn {
            background: rgba(255, 107, 157, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 15px;
            font-family: 'Comfortaa', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            transform: scale(0.3);
            text-align: left;
        }

        .choice-btn.visible {
            opacity: 1;
            transform: scale(1);
        }

        .choice-btn:active {
            transform: scale(0.95) !important;
            background: rgba(255, 107, 157, 0.4);
        }

        .choice-btn .emoji-label {
            margin-right: 8px;
        }

        /* === ВЗРЫВ === */
        .explosion-particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            border-radius: 50%;
            animation: particleExplode 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes particleExplode {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        .spark {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 20px;
            animation: sparkFly 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes sparkFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1.5); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
        }

        /* === СЕРДЦЕ ПОДАРОК === */
        .prize-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
        }

        .prize-overlay.show {
            display: flex;
        }

        .prize-heart {
            font-size: 120px;
            animation: heartPrize 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.6));
        }

        @keyframes heartPrize {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15) rotate(-3deg); }
            30% { transform: scale(1) rotate(3deg); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        .prize-text {
            font-size: 26px;
            color: #ff6b9d;
            font-weight: 700;
            margin-top: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.8);
            animation: prizeGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes prizeGlow {
            from { text-shadow: 0 0 20px rgba(255, 107, 157, 0.5); }
            to { text-shadow: 0 0 40px rgba(255, 107, 157, 1), 0 0 80px rgba(255, 107, 157, 0.5); }
        }

        .prize-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 12px;
        }

        .prize-tap {
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            animation: blink 1.5s ease-in-out infinite;
        }

        .prize-confetti {
            position: fixed;
            pointer-events: none;
            z-index: 201;
            animation: confettiDrop 3s ease-out forwards;
        }

        @keyframes confettiDrop {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <!-- Фото персонажа (img вместо background) -->
    <img class="character-img" id="charImg" src="basic.png" alt="">

    <!-- Диалоговый бокс -->
    <div class="dialog-box" id="dialogBox">
        <div class="speaker-name" id="speakerName">Русланчекс</div>
        <div class="dialog-text" id="dialogText"></div>
        <div class="tap-indicator" id="tapIndicator">
            <div class="tap-triangle"></div>
        </div>
    </div>

    <!-- Варианты ответа -->
    <div class="choices-container" id="choicesContainer">
        <div class="choice-question">
            <div class="speaker-name">Русланчекс</div>
            <div class="question-text" id="questionText"></div>
        </div>
    </div>

    <!-- Приз -->
    <div class="prize-overlay" id="prizeOverlay">
        <div class="prize-heart">❤️</div>
        <div class="prize-text">Ты выиграла!!! 🎉</div>
        <div class="prize-sub">Подарок — сердечко от Русланчекса 💝</div>
        <div class="prize-tap">тапни для продолжения</div>
    </div>

    <script>
        // === TELEGRAM ===
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const username = user?.username || user?.first_name || 'unknown';

        // === ЭЛЕМЕНТЫ ===
        const charImg = document.getElementById('charImg');
        const dialogBox = document.getElementById('dialogBox');
        const dialogText = document.getElementById('dialogText');
        const speakerName = document.getElementById('speakerName');
        const tapIndicator = document.getElementById('tapIndicator');
        const choicesContainer = document.getElementById('choicesContainer');
        const questionText = document.getElementById('questionText');
        const prizeOverlay = document.getElementById('prizeOverlay');

        // === СОСТОЯНИЕ ===
        let currentStep = 0;
        let isTyping = false;
        let fullText = '';
        let typingTimeout = null;
        let canTap = false;
        let currentPhotoIndex = 0;
        let currentCallback = null; // <-- сохраняем callback

        // === ФОНОВЫЕ ЧАСТИЦЫ ===
        function createBgParticle() {
            const p = document.createElement('div');
            p.className = 'bg-particle';
            const size = 3 + Math.random() * 6;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.background = `hsl(${300 + Math.random() * 60}, 70%, 70%)`;
            p.style.animationDuration = (6 + Math.random() * 8) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 15000);
        }
        setInterval(createBgParticle, 500);
        for (let i = 0; i < 10; i++) setTimeout(createBgParticle, i * 200);

        // === ЧЕРЕДОВАНИЕ ФОТОК ===
        function getBasicPhoto() {
            const photo = currentPhotoIndex === 0 ? 'basic.png' : 'basicZ.png';
            currentPhotoIndex = currentPhotoIndex === 0 ? 1 : 0;
            return photo;
        }

        // === СМЕНА ФОТО ===
        function setPhoto(filename) {
            charImg.classList.add('fade');
            setTimeout(() => {
                charImg.src = filename;
                charImg.classList.remove('fade');
            }, 400);
        }

        // === ПЕЧАТАНИЕ ТЕКСТА ===
        function typeText(text, callback) {
            isTyping = true;
            canTap = false;
            fullText = text;
            currentCallback = callback || null;
            dialogText.innerHTML = '';
            tapIndicator.classList.remove('show');

            let i = 0;

            function typeNext() {
                if (i < text.length) {
                    if (text[i] === '\n') {
                        dialogText.appendChild(document.createElement('br'));
                    } else {
                        const span = document.createElement('span');
                        span.textContent = text[i];
                        span.style.opacity = '0';
                        span.style.animation = 'none';
                        dialogText.appendChild(span);
                        // Плавное появление
                        requestAnimationFrame(() => {
                            span.style.transition = 'opacity 0.05s';
                            span.style.opacity = '1';
                        });
                    }
                    i++;
                    typingTimeout = setTimeout(typeNext, 35);
                } else {
                    finishTyping();
                }
            }

            typeNext();
        }

        function finishTyping() {
            isTyping = false;
            dialogText.innerHTML = fullText.replace(/\n/g, '<br>');

            if (currentCallback) {
                // Есть callback — значит после текста будет действие
                // НЕ даём тапать, сразу вызываем callback
                canTap = false;
                tapIndicator.classList.remove('show');
                currentCallback();
                currentCallback = null;
            } else {
                // Обычный диалог — можно тапать дальше
                canTap = true;
                tapIndicator.classList.add('show');
            }
        }

        function skipTyping() {
            if (!isTyping) return;
            clearTimeout(typingTimeout);
            finishTyping();
        }

        // === ВЗРЫВ ===
        function createExplosion(x, y, callback) {
            const colors = ['#ff6b9d', '#ff5722', '#ffeb3b', '#ff9800', '#e91e63', '#fff', '#ba68c8'];
            const emojis = ['✨', '💥', '⚡', '🔥', '💫', '⭐'];

            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'explosion-particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.width = (4 + Math.random() * 8) + 'px';
                p.style.height = p.style.width;
                p.style.background = colors[Math.floor(Math.random() * colors.length)];

                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 100;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }

            for (let i = 0; i < 6; i++) {
                const s = document.createElement('div');
                s.className = 'spark';
                s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                s.style.left = x + 'px';
                s.style.top = y + 'px';

                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 80;
                s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');

                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }

            if (callback) setTimeout(callback, 250);
        }

        // === ПОКАЗАТЬ ВАРИАНТЫ ===
        function showChoices(question, choices) {
            dialogBox.classList.add('hidden');
            choicesContainer.classList.add('show');
            questionText.textContent = question;

            // Удалить старые кнопки
            const oldBtns = choicesContainer.querySelectorAll('.choice-btn');
            oldBtns.forEach(b => b.remove());

            const emojiLabels = ['🖤', '💙', '🤍'];

            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `<span class="emoji-label">${emojiLabels[index]}</span>${choice.text}`;

                // Клик по варианту
                btn.addEventListener('click', () => {
                    handleChoice(choice);
                });

                choicesContainer.appendChild(btn);

                // Взрыв → появление кнопки с задержкой
                const delay = 400 + index * 900;

                setTimeout(() => {
                    const rect = btn.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;

                    createExplosion(cx, cy, () => {
                        btn.classList.add('visible');
                    });
                }, delay);
            });
        }

        // === ОБРАБОТКА ВЫБОРА ===
        function handleChoice(choice) {
            choicesContainer.classList.remove('show');
            dialogBox.classList.remove('hidden');

            setPhoto(choice.photo);

            speakerName.textContent = 'Русланчекс';
            typeText(choice.response, () => {
                // После реакции — пауза и приз
                setTimeout(() => {
                    showPrize();
                }, 2500);
            });
        }

        // === ПРИЗ ===
        function showPrize() {
            dialogBox.classList.add('hidden');
            prizeOverlay.classList.add('show');

            // Конфетти
            const confettiColors = ['#ff6b9d', '#ffeb3b', '#4fc3f7', '#81c784', '#ff8a65', '#ce93d8', '#fff'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'prize-confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.top = '-20px';
                    c.style.width = (6 + Math.random() * 10) + 'px';
                    c.style.height = (6 + Math.random() * 10) + 'px';
                    c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    c.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 50);
            }

            // Отправить данные боту
            if (tg.initData) {
                try {
                    tg.sendData(JSON.stringify({
                        action: 'prize_won',
                        prize: 'heart',
                        user: username
                    }));
                } catch (e) {
                    console.log('sendData error:', e);
                }
            }

            // Тап для продолжения
            prizeOverlay.addEventListener('click', () => {
                prizeOverlay.classList.remove('show');
                dialogBox.classList.remove('hidden');
                continueAfterPrize();
            }, { once: true });
        }

        // === ПОСЛЕ ПРИЗА ===
        function continueAfterPrize() {
            setPhoto(getBasicPhoto());
            speakerName.textContent = 'Русланчекс';
            typeText('это ещё не всё... продолжение следует 😏✨');
            // Сюда потом добавим следующие диалоги
        }

        // === СЦЕНАРИЙ ===
        const scenario = [
            {
                type: 'dialog',
                speaker: 'Русланчекс',
                text: 'прпрпрпрпрпр дианочка любимая, с 8 марта дорогая, я кое чо подготовил харашо, ты тапай пальчиками кароче',
                photo: 'auto'
            },
            {
                type: 'dialog',
                speaker: 'Русланчекс',
                text: 'ета так называемые свидания как в бравл старсе но тута да',
                photo: 'auto'
            },
            {
                type: 'choice',
                speaker: 'Русланчекс',
                question: 'так какую футболку ты надела бы из этих? 👕',
                photo: 'auto',
                choices: [
                    {
                        text: 'Чёрная футболка',
                        photo: 'vay.png',
                        response: 'черни? О чорт ты блек гирл теперь окэээйс 🖤🔥'
                    },
                    {
                        text: 'Синяя футболка',
                        photo: 'strany.png',
                        response: 'синий прикол ты типа футболист да у них тоже многа синих футболак ⚽💙'
                    },
                    {
                        text: 'Белая футболка',
                        photo: 'yra.png',
                        response: 'белая футболка твои любимые футболки бели все сходится вери вери гуд 🤍✨'
                    }
                ]
            }
        ];

        // === ЗАПУСК ШАГА ===
        function runStep(index) {
            if (index >= scenario.length) return;
            const step = scenario[index];
            currentStep = index;

            if (step.type === 'dialog') {
                const photo = step.photo === 'auto' ? getBasicPhoto() : step.photo;
                setPhoto(photo);
                speakerName.textContent = step.speaker;
                typeText(step.text); // без callback — обычный тап дальше
            }

            if (step.type === 'choice') {
                const photo = step.photo === 'auto' ? getBasicPhoto() : step.photo;
                setPhoto(photo);
                speakerName.textContent = step.speaker;
                typeText(step.question, () => {
                    // После допечатывания — показать варианты
                    setTimeout(() => {
                        showChoices(step.question, step.choices);
                    }, 600);
                });
            }
        }

        // === ТАП ПО ДИАЛОГУ ===
        dialogBox.addEventListener('click', () => {
            if (isTyping) {
                skipTyping();
                return;
            }
            if (!canTap) return;

            canTap = false;
            tapIndicator.classList.remove('show');

            const nextIndex = currentStep + 1;
            if (nextIndex < scenario.length) {
                runStep(nextIndex);
            }
        });

        // === СТАРТ ===
        charImg.src = 'basic.png';
        currentPhotoIndex = 1; // следующий будет basicZ

        setTimeout(() => {
            runStep(0);
        }, 800);
    </script>
</body>
</html>
